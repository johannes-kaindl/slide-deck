name: Release
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']   # SemVer ohne v-Praefix (CORE-GIT-03)
  workflow_dispatch:
permissions:
  contents: write
  id-token: write       # actions/attest-build-provenance
  attestations: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Gate (typecheck + test + lint + build)
        run: npm run typecheck && npm test && npm run lint && npm run build
      - name: Verify tag == manifest.version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG != manifest.json version $MANIFEST_VERSION"
            exit 1
          fi
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="$(awk "/^## \[${GITHUB_REF_NAME}\]/{f=1;next}/^## \[/{f=0}f" CHANGELOG.md)"
          gh release create "${GITHUB_REF_NAME}" main.js manifest.json styles.css \
            --title "${GITHUB_REF_NAME}" \
            --notes "${NOTES:-Release ${GITHUB_REF_NAME}}"
